  #  entrypoint: >
  #    sh -c "
  #      ollama serve &
  #      sleep 5 &&
  #      ollama pull llama3.1:8b &&
  #      wait
  #    "

  analyser:
    build:
      context: ./analysis
    container_name: analyser
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./analysis/config.yaml:/app/config.yaml:ro
      - analysis-cache:/app/cache
      - ./analysis/threatintel/rules.d:/app/threatintel/rules.d:rw
    environment:
      # Provider selection — overrides config.yaml at runtime
      - LLM_PROVIDER=gemini
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - GEMINI_API_KEY_FILE=/run/secrets/gemini_api_key
      - THREATFOX_API_KEY_FILE=/run/secrets/threatfox_api_key
      # ── Fleet push: register IDS targets ─────────────────────────────────
      # Option A — inline env var (comma-separated, no spaces):
      #   - FALCO_TARGETS=http://192.168.55.194:5002,http://192.168.55.195:5002
      # Option B — secret file (one URL per line, recommended for 3+ servers):
      - FALCO_TARGETS_FILE=/run/secrets/falco_targets
      # Per-target webhook API keys (same order as the targets list):
      - FALCO_TARGET_KEYS_FILE=/run/secrets/falco_target_keys
      # Optional human-readable labels for logs & /api/fleet/status:
      # - FALCO_TARGET_LABELS_FILE=/run/secrets/falco_target_labels
      # Push timeout in seconds (default 10):
      - FLEET_DISPATCH_TIMEOUT=10
      # Storage
      - STACK=loki
      - LOKI_URL=http://loki:3100
      - OBFUSCATION_LEVEL=minimal
      - RULES_DIR=/app/threatintel/rules.d
    secrets:
      - gemini_api_key
      - falco_targets
      - falco_target_keys
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - mon-healio

  falcosidekick:
    image: falcosecurity/falcosidekick:2.30.0
    container_name: falcosidekick
    restart: unless-stopped
    ports:
      - "0.0.0.0:2801:2801"
    volumes:
      - ./falcosidekick/config/falcosidekick.yaml:/etc/falcosidekick/config.yaml:ro
    command: ["-c", "/etc/falcosidekick/config.yaml"]
    environment:
      - DEBUG=true
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2801"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mon-healio

  grafana:
    image: grafana/grafana:12.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # FIX #5: Use _FILE pattern for Grafana admin password too.
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_LOG_MODE=file
      - GF_PATHS_LOGS=/var/log/grafana
      - GF_LOG_LEVEL=debug
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-logs:/var/log/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/notifiers:/etc/grafana/provisioning/notifiers:ro
      - ./grafana/provisioning/folders:/etc/grafana/provisioning/folders:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mon-healio

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./storage/config/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mon-healio

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./storage/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mon-healio

  # ── Sigma rule watcher / converter / deployer ───────────────────────────────
  sigma:
    build:
      context: ./sigma
    container_name: sigma
    restart: unless-stopped
    volumes:
      # Drop Sigma rules here — watched in real time
      - ./sigma/rules:/app/rules:rw
      # Persistent dedup state (survives restarts)
      - sigma-state:/app/state
      # Quarantine for invalid / rejected rules (inspect after failures)
      - ./sigma/failed:/app/failed:rw
      # Declarative mapping files
      - ./sigma/config/field_mapping.json:/app/config/field_mapping.json:ro
      - ./sigma/config/label_mapping.json:/app/config/label_mapping.json:ro
    environment:
      # ── Directories ───────────────────────────────────────────────────
      - SIGMA_RULES_DIR=/app/rules
      - SIGMA_STATE_DIR=/app/state
      - SIGMA_FAILED_DIR=/app/failed
 
      # ── Watcher behaviour ─────────────────────────────────────────────
      - SIGMA_POLL_INTERVAL=5
      - SIGMA_DEDUP_STRATEGY=sha256
      - SIGMA_FAIL_ON_INVALID=true
 
      # ── Output format ─────────────────────────────────────────────────
      # ruler              → push directly to Loki ruler API
      # grafana_alerting   → provision via Grafana alerting API
      # both               → deploy to both targets simultaneously
      - SIGMA_OUTPUT_FORMAT=ruler
 
      # ── pySigma backend options ───────────────────────────────────────
      - SIGMA_ADD_LINE_FILTERS=true
      - SIGMA_CASE_SENSITIVE=false
      - NORMALIZATION_PROFILE=falco_loki
 
      # ── Mapping config files ──────────────────────────────────────────
      - SIGMA_FIELD_MAP_FILE=/app/config/field_mapping.json
      - SIGMA_LABEL_MAP_FILE=/app/config/label_mapping.json
 
      # ── Loki ruler target ─────────────────────────────────────────────
      - LOKI_URL=http://loki:3100
      - LOKI_RULER_PATH=/loki/api/v1/rules
      - LOKI_GROUP_BY_FIELD=hostname
 
      # ── Grafana alerting target ───────────────────────────────────────
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_DATASOURCE_UID=loki
      - GRAFANA_FOLDER=security
      - GRAFANA_ORG_ID=1
      - GRAFANA_INTERVAL=1m
      - GRAFANA_CONTACT_POINT=default
      # Grafana API key (optional — omit GRAFANA_API_KEY_FILE if Grafana has no auth)
      - GRAFANA_API_KEY_FILE=/run/secrets/grafana_sigma_api_key
    secrets:
      - grafana_sigma_api_key
    depends_on:
      loki:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/src/healthcheck.py"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - mon-healio

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  falco_targets:
    file: ./secrets/falco_targets.txt   
  falco_target_keys:
    file: ./secrets/falco_target_keys.txt
  threatfox_api_key:
    file: ./secrets/threatfox_api_key.txt
  grafana_sigma_api_key:
    file: ./secrets/grafana_sigma_api_key.txt

volumes:
  alloy-data:
  ollama-models:
  analysis-cache:
  grafana-data:
  grafana-logs:
  loki-data:
  sigma-state:

networks:
  mon-healio:
    name: mon-healio
    external: true
