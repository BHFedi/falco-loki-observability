  #    sh -c "
  #      ollama serve &
  #      sleep 5 &&
  #      ollama pull llama3.1:8b &&
  #      wait
  #    "

  analyser:
    build:
      context: ./analysis
    container_name: analyser
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./analysis/config.yaml:/app/config.yaml:ro
      - analysis-cache:/app/cache
    environment:
      - LLM_PROVIDER=gemini
      # If using Docker Secrets, use the _FILE suffix:
      #- GEMINI_API_KEY_FILE=/run/secrets/gemini_api_key 
      # Or fallback to direct env (your current setup):
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - LOKI_URL=http://loki:3100
      - STACK=loki
    # secrets:
    #   - gemini_api_key
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - mon-healio

  falcosidekick:
    image: falcosecurity/falcosidekick:2.30.0
    container_name: falcosidekick
    restart: unless-stopped
    ports:
      - "0.0.0.0:2801:2801"
    volumes:
      - ./falcosidekick/config/falcosidekick.yaml:/etc/falcosidekick/config.yaml:ro
    command: ["-c", "/etc/falcosidekick/config.yaml"]
    environment:
      - DEBUG=true
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2801"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mon-healio

  grafana:
    image: grafana/grafana:12.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_LOG_MODE=file
      - GF_PATHS_LOGS=/var/log/grafana
      - GF_LOG_LEVEL=debug
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-logs:/var/log/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/notifiers:/etc/grafana/provisioning/notifiers:ro
      - ./grafana/provisioning/folders:/etc/grafana/provisioning/folders:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mon-healio

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./storage/config/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mon-healio

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./storage/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mon-healio

volumes:
  alloy-data:
  ollama-models:
  analysis-cache:
  grafana-data:
  grafana-logs:
  loki-data:

networks:
  mon-healio:
    name: mon-healio
    external: true
