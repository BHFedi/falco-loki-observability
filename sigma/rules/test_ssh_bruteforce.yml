title: SSH Brute Force Attempt
id: b2c3d4e5-0001-0002-0003-000000000002
status: test
description: Detects multiple failed SSH login attempts indicating a brute force attack
author: test
date: 2026/04/23
tags:
  - attack.credential_access
  - attack.ta0006
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    proc_name:
      - sshd
    proc_cmdline|contains:
      - 'Failed password'
      - 'Invalid user'
      - 'authentication failure'
  condition: selection
level: high
fields:
  - hostname
  - proc_cmdline
falsepositives:
  - Legitimate failed logins
