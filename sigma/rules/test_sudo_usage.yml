title: Suspicious Sudo Usage
id: a1b2c3d4-0001-0002-0003-000000000001
status: test
description: Detects suspicious sudo command execution - UPDATED
author: test
date: 2026/04/23
modified: 2026/04/23
tags:
  - attack.privilege_escalation
  - attack.ta0004
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    proc_cmdline|contains:
      - 'sudo su'
      - 'sudo -i'
      - 'sudo bash'
      - 'sudo sh'
  condition: selection
level: high
falsepositives:
  - Legitimate admin activity
